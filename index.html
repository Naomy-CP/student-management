<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>

    <div id="login-section" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">🎓 Gestión de Estudiantes</h4>
                        <small>Iniciar Sesión</small>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" class="form-control" id="loginUsuario">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="loginPassword">
                        </div>
                        <div id="loginError" class="alert alert-danger d-none">
                            Usuario o contraseña incorrectos
                        </div>
                        <button class="btn btn-primary w-100" id="btnLogin" onclick="iniciarSesion()">
                            Iniciar Sesión
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <div id="main-section" class="d-none">
        <nav class="navbar navbar-dark bg-primary">
            <div class="container">
                <span class="navbar-brand mb-0 h1">Gestión de Estudiantes</span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- Formulario -->
            <div class="card shadow mb-4" id="form-section">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Agregar Estudiante</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Matrícula</label>
                            <input type="text" class="form-control" id="matricula">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Carrera</label>
                            <input type="text" class="form-control" id="carrera">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Índice Académico</label>
                            <input type="number" class="form-control" id="indice_academico" min="0" max="4" step="0.01">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-primary" id="btnGuardar" onclick="guardarEstudiante()">
                                Guardar Estudiante
                            </button>
                            <button class="btn btn-secondary ms-2 d-none" id="btnCancelar" onclick="cancelarEdicion()">
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow mb-4" id="search-section">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">🔍 Buscar Estudiante</h5>
                </div>
                <div class="card-body">
                    <div class="input-group">
                        <span class="input-group-text">🔍</span>
                        <input type="text" class="form-control" id="busqueda" placeholder="Buscar por nombre o matrícula..." oninput="buscarEstudiante()">
                        <button class="btn btn-outline-secondary" onclick="cargarEstudiantes()">
                            Limpiar búsqueda
                        </button>
                    </div>
                </div>
            </div>

            <!-- Lista de Estudiantes -->
            <div class="card shadow" id="list-section">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Lista de Estudiantes</h5>
                    <span class="badge bg-light text-dark" id="contador">0 estudiantes</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Nombre</th>
                                    <th>Matrícula</th>
                                    <th>Carrera</th>
                                    <th>Índice</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaEstudiantes">
                                <tr>
                                    <td colspan="6" class="text-center py-4">
                                        <div class="spinner-border text-primary" role="status"></div>
                                        <p class="mt-2">Cargando estudiantes...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="backend/app.js"></script>
</body>
</html>
